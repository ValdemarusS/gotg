<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Прокси Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 100%;
        }
        .telegram-btn {
            background: #2aabee;
            border: none;
            border-radius: 40px;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.15s ease, background 0.2s;
            font-family: inherit;
            display: inline-block;
            text-decoration: none;
        }
        .telegram-btn:hover {
            background: #1e96d4;
            transform: scale(1.02);
        }
        .telegram-btn:active {
            transform: scale(0.98);
        }
        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #94a3b8;
            background: #1e293b;
            padding: 12px 18px;
            border-radius: 24px;
            max-width: 400px;
            text-align: left;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .info p {
            margin: 6px 0;
        }
        .info code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
            word-break: break-all;
        }
        .error {
            background: #7f1a1a;
            color: #fecaca;
        }
        .error code {
            background: #4a0e0e;
            color: #ffb3b3;
        }
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .info {
                max-width: 90vw;
                font-size: 13px;
            }
            .telegram-btn {
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="#" id="proxyLink" class="telegram-btn">Перейти в Telegram</a>
    <div id="statusMsg" class="info"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let server = urlParams.get('server');
    let port = urlParams.get('port');
    let secret = urlParams.get('secret');

    const linkElement = document.getElementById('proxyLink');
    const msgDiv = document.getElementById('statusMsg');

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    if (server && port && secret && server.trim() !== '' && port.trim() !== '' && secret.trim() !== '') {
        const proxyUrl = `tg://proxy?server=${encodeURIComponent(server)}&port=${encodeURIComponent(port)}&secret=${encodeURIComponent(secret)}`;
        linkElement.href = proxyUrl;
        // Показываем сервер, порт и секрет с иконками
        msgDiv.innerHTML = `
            <p>✅ <strong>Прокси готов</strong></p>
            <p>📡 Сервер: <code>${escapeHtml(server)}</code></p>
            <p>🔌 Порт: <code>${escapeHtml(port)}</code></p>
            <p>🔐 Секрет: <code>${escapeHtml(secret)}</code></p>
            <p>👇 Нажмите кнопку, чтобы подключиться</p>
        `;
    } else {
        linkElement.style.opacity = '0.5';
        linkElement.style.cursor = 'not-allowed';
        linkElement.removeAttribute('href');
        linkElement.addEventListener('click', (e) => e.preventDefault());
        msgDiv.className = 'info error';
        msgDiv.innerHTML = '❌ Ошибка: не указаны все параметры server, port, secret.<br><br>Пример ссылки:<br><code>?server=1.2.3.4&port=443&secret=ee1234567890abcdef</code>';
    }
</script>
</body>
</html>
